model:
  backend: hf_causal_lm
  model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
  device: auto
  dtype: auto
  local_files_only: true
inputs:
  pair_jsonl: outputs/behavior/E0__mhst__pairs__all__seed0.jsonl
  sanity_jsonl: outputs/behavior/E0__mhst__sanity__all__seed0.jsonl
run:
  mode: m3_full
  model_label: llama31_8b
  include_splits: [test]
  include_margins: [1, 2, 3]
  include_history_depths: [0, 1, 2]
  output_margin_control: false
  bootstrap_seed: 0
execution:
  allow_resume: true
  progress_every_rows: 10
  heartbeat_seconds: 30
outputs:
  scored_rows_jsonl: outputs/behavior/m3_llama/E3__llama31_8b__mhst__rows__seed0.jsonl
  scored_rows_partial_jsonl: outputs/behavior/m3_llama/E3__llama31_8b__mhst__rows_partial__seed0.jsonl
  pair_summary_jsonl: outputs/behavior/m3_llama/E3__llama31_8b__mhst__pairs__seed0.jsonl
  summary_json: outputs/behavior/m3_llama/E3__llama31_8b__mhst__summary__seed0.json
  sanity_summary_json: outputs/behavior/m3_llama/E3__llama31_8b__mhst__sanity_summary__seed0.json
  summary_table_csv: outputs/behavior/m3_llama/E3__llama31_8b__mhst__summary_table__seed0.csv
  overall_plot_png: outputs/behavior/m3_llama/E3__llama31_8b__mhst__reversibility_overall_test__seed0.png
  plot_png_by_k: outputs/behavior/m3_llama/E3__llama31_8b__mhst__reversibility_k{k}_test__seed0.png
  cell_heatmap_png: outputs/behavior/m3_llama/E3__llama31_8b__mhst__cell_heatmap_test__seed0.png
  output_margin_plot_png: outputs/behavior/m3_llama/E3__llama31_8b__mhst__output_margin_control_test__seed0.png
  run_state_json: outputs/behavior/m3_llama/E3__llama31_8b__mhst__run_state__seed0.json
  heartbeat_json: outputs/behavior/m3_llama/E3__llama31_8b__mhst__heartbeat__seed0.json
  config_snapshot_yaml: outputs/behavior/m3_llama/E3__llama31_8b__mhst__config__seed0.yaml
  progress_log_txt: outputs/behavior/m3_llama/E3__llama31_8b__mhst__progress__seed0.log
  stop_flag_path: outputs/behavior/m3_llama/E3__llama31_8b__mhst__STOP__seed0.flag
