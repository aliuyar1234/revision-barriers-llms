  state_rows_jsonl: outputs/states/E4r1__qwen25_7b__mhst__state_rows__seed0.jsonl
  selected_probe_json: outputs/probes/E4r1__qwen25_7b__mhst__selected_probe__seed0.json
run:
  run_id: E5r2__qwen25_7b__mhst__intervention__seed0
  alpha_grid: [0.25, 0.5, 1.0, 2.0]
  bootstrap_resamples: 1000
  bootstrap_seed: 0
  random_control_seed: 0
  random_control_count: 5
outputs:
